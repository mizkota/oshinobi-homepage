<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSHINOBI GUT 24 - Instagram投稿ジェネレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a1628;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e3a5f, #0f2440);
    border-bottom: 1px solid #c8a84e44;
    padding: 16px 20px;
    text-align: center;
  }
  header h1 {
    color: #c8a84e;
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 0.1em;
  }
  header p { color: #8aa0bb; font-size: 0.75rem; margin-top: 4px; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

  .card {
    background: linear-gradient(135deg, #1a2f4a, #0f2030);
    border: 1px solid #2a4060;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    color: #c8a84e;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Photo upload */
  .photo-upload-area {
    border: 2px dashed #2a4060;
    border-radius: 12px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: #0d1e30;
    transition: border-color 0.2s;
  }
  .photo-upload-area:hover { border-color: #c8a84e; }
  .photo-upload-area img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .photo-upload-area .upload-hint {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: #5a7a9a; font-size: 0.85rem; text-align: center;
    padding: 20px;
  }
  .photo-upload-area .upload-hint .icon { font-size: 2.5rem; }
  #photoInput { display: none; }

  /* Form elements */
  label { display: block; font-size: 0.8rem; color: #8aa0bb; margin-bottom: 6px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  select, input[type="text"], textarea {
    width: 100%;
    background: #0d1e30;
    border: 1px solid #2a4060;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  select:focus, input[type="text"]:focus, textarea:focus {
    border-color: #c8a84e;
  }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

  /* Tension sliders */
  .tension-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tension-group label { margin-top: 0; }
  .slider-wrap {
    display: flex; align-items: center; gap: 10px; margin-top: 6px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #c8a84e 0%, #c8a84e var(--pct), #2a4060 var(--pct), #2a4060 100%);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8a84e;
    cursor: pointer;
  }
  .slider-val {
    min-width: 42px; text-align: right;
    font-weight: 700; color: #c8a84e; font-size: 0.95rem;
  }

  /* Tip regenerate */
  .tip-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .tip-label { font-size: 0.8rem; color: #8aa0bb; }
  .btn-regen {
    background: none; border: 1px solid #2a4060; border-radius: 6px;
    color: #8aa0bb; font-size: 0.72rem; padding: 3px 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-regen:hover { border-color: #c8a84e; color: #c8a84e; }

  /* Preview canvas */
  #previewCanvas {
    width: 100%; aspect-ratio: 1;
    border-radius: 12px;
    display: block;
    background: #0d1e30;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, #c8a84e, #a8882e);
    color: #0a1628;
    font-size: 1rem; font-weight: 900;
    padding: 16px;
    border: none; border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }
  .btn-generate:hover { opacity: 0.9; }
  .btn-generate:active { transform: scale(0.98); }

  /* Download & Caption */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .btn-action {
    background: #1a2f4a;
    border: 1px solid #2a4060;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 0.85rem; font-weight: 700;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-action:hover { border-color: #c8a84e; color: #c8a84e; }

  .caption-box {
    background: #0d1e30;
    border: 1px solid #2a4060;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #b0c0d0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .hidden { display: none !important; }
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #c8a84e; color: #0a1628;
    font-weight: 700; font-size: 0.85rem;
    padding: 10px 24px; border-radius: 100px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>⚡ OSHINOBI GUT 24</h1>
  <p>Instagram 投稿画像ジェネレーター</p>
</header>

<div class="container">

  <!-- Photo -->
  <div class="card">
    <div class="card-title">📷 写真</div>
    <div class="photo-upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()">
      <div class="upload-hint" id="uploadHint">
        <span class="icon">📸</span>
        <span>タップして写真を選択<br>またはカメラで撮影</span>
      </div>
      <img id="previewImg" class="hidden" alt="preview">
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment">
  </div>

  <!-- Gut & Tension -->
  <div class="card">
    <div class="card-title">🎾 ガット・テンション</div>

    <label>ガット</label>
    <select id="gutSelect"></select>

    <div class="tension-row" style="margin-top:14px;">
      <div class="tension-group">
        <label>縦テンション</label>
        <div class="slider-wrap">
          <input type="range" id="tensionV" min="35" max="60" value="50" oninput="updateSlider(this,'tensionVVal')">
          <span class="slider-val" id="tensionVVal">50</span>
        </div>
      </div>
      <div class="tension-group">
        <label>横テンション</label>
        <div class="slider-wrap">
          <input type="range" id="tensionH" min="35" max="60" value="48" oninput="updateSlider(this,'tensionHVal')">
          <span class="slider-val" id="tensionHVal">48</span>
        </div>
      </div>
    </div>

    <label style="margin-top:14px;">ラケット名（任意）</label>
    <input type="text" id="racketName" placeholder="例: Wilson Blade 98">
  </div>

  <!-- Tip -->
  <div class="card">
    <div class="card-title">💡 ワンポイントネタ</div>
    <div class="tip-header">
      <span class="tip-label">自動生成（編集可能）</span>
      <button class="btn-regen" onclick="regenTip()">🎲 再生成</button>
    </div>
    <textarea id="tipText" rows="3"></textarea>
  </div>

  <!-- Generate -->
  <button class="btn-generate" onclick="generateImage()">✨ 画像を生成する</button>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="card">
      <div class="card-title">🖼 プレビュー</div>
      <canvas id="previewCanvas" width="1080" height="1080"></canvas>
    </div>

    <div class="action-row">
      <button class="btn-action" onclick="downloadImage()">⬇️ ダウンロード（PNG）</button>
      <button class="btn-action" onclick="copyCaption()">📋 キャプションをコピー</button>
    </div>

    <div class="card">
      <div class="card-title">📝 キャプション</div>
      <div class="caption-box" id="captionBox"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ========== DATA ==========

  },
  {

    tips: [
      '錦織圭選手の使用で有名。柔らかめのポリで腕に優しく、スピンもかけやすい万能ガット🏅',

  },

    ]
  },
  {

    tips: [

      '太めのゲージで耐久性も高く、ハードヒッターにも安心の張りごたえ💪',

    ]
  },
  {
    name: 'ミクロスーパー', brand: 'Gosen', type: 'ナイロン', gauge: '1.30mm', price: 1800, color: '#FF69B4',
    tips: [
      '国産ナイロンの定番中の定番。柔らかい打感でひじや肩に優しく、長時間プレーにも◎🌸',
      'ポリが合わない方・ナイロンで打感を重視する方に。安定した品質と手頃な価格が魅力💖',

    ]
  }
];

let selectedGutIndex = 0;
let uploadedImage = null;
let generatedImageURL = null;

// ========== INIT ==========
function init() {
  const sel = document.getElementById('gutSelect');
  guts.forEach((g, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${g.name}（${g.brand}）— ¥${g.price.toLocaleString()}`;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', () => {
    selectedGutIndex = parseInt(sel.value);
    regenTip();
  });
  regenTip();
  updateSlider(document.getElementById('tensionV'), 'tensionVVal');
  updateSlider(document.getElementById('tensionH'), 'tensionHVal');
}

// ========== PHOTO ==========
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedImage = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = uploadedImage;
    img.classList.remove('hidden');
    document.getElementById('uploadHint').classList.add('hidden');
  };
  reader.readAsDataURL(file);
});

// ========== SLIDER ==========
function updateSlider(el, valId) {
  const min = parseInt(el.min), max = parseInt(el.max), val = parseInt(el.value);
  const pct = ((val - min) / (max - min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  document.getElementById(valId).textContent = val;
}

// ========== TIP ==========
function regenTip() {
  const g = guts[selectedGutIndex];
  const tips = g.tips;
  const tip = tips[Math.floor(Math.random() * tips.length)];
  document.getElementById('tipText').value = tip;
}

// ========== GENERATE ==========
async function generateImage() {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  const gut = guts[selectedGutIndex];
  const tensionV = document.getElementById('tensionV').value;
  const tensionH = document.getElementById('tensionH').value;
  const racket = document.getElementById('racketName').value.trim();
  const tip = document.getElementById('tipText').value.trim();

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#1e3a5f');
  bg.addColorStop(1, '#0f2440');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Top bar gradient
  const topBar = ctx.createLinearGradient(0, 0, W, 0);
  topBar.addColorStop(0, '#c8a84e22');
  topBar.addColorStop(0.5, '#c8a84e44');
  topBar.addColorStop(1, '#c8a84e22');
  ctx.fillStyle = topBar;
  ctx.fillRect(0, 0, W, 110);

  // Gold accent line
  ctx.fillStyle = '#c8a84e';
  ctx.fillRect(0, 110, W, 3);

  // Title
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 42px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('OSHINOBI GUT 24', W / 2, 68);

  ctx.fillStyle = '#ffffff88';
  ctx.font = '22px "Helvetica Neue", Arial, sans-serif';
  ctx.fillText('ガット張替サービス', W / 2, 100);

  // Photo area
  const photoY = 125, photoH = 520;
  if (uploadedImage) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, photoY, W, photoH);
        ctx.clip();
        // Cover crop
        const scale = Math.max(W / img.width, photoH / img.height);
        const sw = img.width * scale, sh = img.height * scale;
        ctx.drawImage(img, (W - sw) / 2, photoY + (photoH - sh) / 2, sw, sh);
        ctx.restore();
        resolve();
      };
      img.src = uploadedImage;
    });
    // Overlay gradient on photo
    const photoOverlay = ctx.createLinearGradient(0, photoY, 0, photoY + photoH);
    photoOverlay.addColorStop(0, 'rgba(15,36,64,0.1)');
    photoOverlay.addColorStop(0.7, 'rgba(15,36,64,0.2)');
    photoOverlay.addColorStop(1, 'rgba(15,36,64,0.85)');
    ctx.fillStyle = photoOverlay;
    ctx.fillRect(0, photoY, W, photoH);
  } else {
    // No photo placeholder
    ctx.fillStyle = '#0d1e30';
    ctx.fillRect(0, photoY, W, photoH);
    ctx.fillStyle = '#2a4060';
    ctx.font = '60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('📷', W / 2, photoY + photoH / 2 + 20);
    ctx.fillStyle = '#3a5070';
    ctx.font = '28px Arial';
    ctx.fillText('写真をアップロードしてください', W / 2, photoY + photoH / 2 + 80);
  }

  // Bottom info panel
  const panelY = photoY + photoH;
  ctx.fillStyle = 'rgba(10,22,40,0.92)';
  ctx.fillRect(0, panelY, W, H - panelY);

  // Gut color accent bar
  ctx.fillStyle = gut.color;
  ctx.fillRect(0, panelY, W, 5);

  // Gut name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 56px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(gut.name, 50, panelY + 72);

  // Brand / type / gauge
  ctx.fillStyle = gut.color;
  ctx.font = 'bold 26px "Helvetica Neue", Arial, sans-serif';
  const brandText = `${gut.brand}  /${gut.type}  /${gut.gauge}`;
  ctx.fillText(brandText, 50, panelY + 112);

  // Tension display
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 38px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText(`${tensionV} / ${tensionH} lbs`, W - 50, panelY + 72);
  ctx.fillStyle = '#8aa0bb';
  ctx.font = '20px "Helvetica Neue", Arial, sans-serif';
  ctx.fillText('縦 / 横テンション', W - 50, panelY + 100);

  // Racket (if set)
  let tipStartY = panelY + 145;
  if (racket) {
    ctx.fillStyle = '#8aa0bb';
    ctx.font = '22px "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`🎾 ${racket}`, 50, tipStartY);
    tipStartY += 36;
  }

  // Divider
  ctx.strokeStyle = '#2a4060';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(50, tipStartY + 6);
  ctx.lineTo(W - 50, tipStartY + 6);
  ctx.stroke();
  tipStartY += 24;

  // Tip text (wrapped)
  ctx.fillStyle = '#d0dce8';
  ctx.font = '24px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'left';
  const tipLines = wrapText(ctx, tip, W - 100, 24);
  tipLines.forEach((line, i) => {
    ctx.fillText(line, 50, tipStartY + i * 36);
  });

  // Instagram handle
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 28px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('@oshinobi_gut_24', W / 2, H - 30);

  // Store and show
  generatedImageURL = canvas.toDataURL('image/png');
  generateCaption(gut, tensionV, tensionH, racket, tip);

  document.getElementById('resultsSection').classList.add('visible');
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function wrapText(ctx, text, maxWidth, lineHeight) {
  const words = text.split('');
  const lines = [];
  let current = '';
  for (const ch of words) {
    const test = current + ch;
    if (ctx.measureText(test).width > maxWidth && current !== '') {
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

// ========== ACTIONS ==========
function downloadImage() {
  if (!generatedImageURL) return showToast('先に画像を生成してください');
  const gut = guts[selectedGutIndex];
  const a = document.createElement('a');
  a.download = `gut24_${gut.name}_${Date.now()}.png`;
  a.href = generatedImageURL;
  a.click();
}

function copyCaption() {
  const text = document.getElementById('captionBox').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('キャプションをコピーしました！'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
