<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSHINOBI GUT 24 - Instagram投稿ジェネレーター</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #0a1628;
    color: #e0e0e0;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e3a5f, #0f2440);
    border-bottom: 1px solid #c8a84e44;
    padding: 16px 20px;
    text-align: center;
  }
  header h1 {
    color: #c8a84e;
    font-size: 1.2rem;
    font-weight: 900;
    letter-spacing: 0.1em;
  }
  header p { color: #8aa0bb; font-size: 0.75rem; margin-top: 4px; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

  .card {
    background: linear-gradient(135deg, #1a2f4a, #0f2030);
    border: 1px solid #2a4060;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    color: #c8a84e;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Photo upload */
  .photo-upload-area {
    border: 2px dashed #2a4060;
    border-radius: 12px;
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    background: #0d1e30;
    transition: border-color 0.2s;
  }
  .photo-upload-area:hover { border-color: #c8a84e; }
  .photo-upload-area img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .photo-upload-area .upload-hint {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    color: #5a7a9a; font-size: 0.85rem; text-align: center;
    padding: 20px;
  }
  .photo-upload-area .upload-hint .icon { font-size: 2.5rem; }
  #photoInput { display: none; }

  /* Form elements */
  label { display: block; font-size: 0.8rem; color: #8aa0bb; margin-bottom: 6px; margin-top: 12px; }
  label:first-of-type { margin-top: 0; }
  select, input[type="text"], textarea {
    width: 100%;
    background: #0d1e30;
    border: 1px solid #2a4060;
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  select:focus, input[type="text"]:focus, textarea:focus {
    border-color: #c8a84e;
  }
  textarea { resize: vertical; min-height: 70px; line-height: 1.5; }

  /* Tension sliders */
  .tension-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .tension-group label { margin-top: 0; }
  .slider-wrap {
    display: flex; align-items: center; gap: 10px; margin-top: 6px;
  }
  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    border-radius: 2px;
    background: linear-gradient(to right, #c8a84e 0%, #c8a84e var(--pct), #2a4060 var(--pct), #2a4060 100%);
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #c8a84e;
    cursor: pointer;
  }
  .slider-val {
    min-width: 42px; text-align: right;
    font-weight: 700; color: #c8a84e; font-size: 0.95rem;
  }

  /* Tip regenerate */
  .tip-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .tip-label { font-size: 0.8rem; color: #8aa0bb; }
  .btn-regen {
    background: none; border: 1px solid #2a4060; border-radius: 6px;
    color: #8aa0bb; font-size: 0.72rem; padding: 3px 8px; cursor: pointer;
    transition: all 0.2s;
  }
  .btn-regen:hover { border-color: #c8a84e; color: #c8a84e; }

  /* Compatibility badge */
  .compat-badge {
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #2a4060;
    background: #0d1e30;
    font-size: 0.82rem;
    line-height: 1.6;
    color: #b0d0b0;
    display: none;
  }
  .compat-badge.visible { display: block; }
  .compat-badge .compat-label {
    font-size: 0.7rem;
    color: #8aa0bb;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }

  /* Preview canvas */
  #previewCanvas {
    width: 100%; aspect-ratio: 1;
    border-radius: 12px;
    display: block;
    background: #0d1e30;
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, #c8a84e, #a8882e);
    color: #0a1628;
    font-size: 1rem; font-weight: 900;
    padding: 16px;
    border: none; border-radius: 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    margin-bottom: 12px;
  }
  .btn-generate:hover { opacity: 0.9; }
  .btn-generate:active { transform: scale(0.98); }

  /* Download & Caption */
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .btn-action {
    background: #1a2f4a;
    border: 1px solid #2a4060;
    border-radius: 10px;
    color: #e0e0e0;
    font-size: 0.85rem; font-weight: 700;
    padding: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-action:hover { border-color: #c8a84e; color: #c8a84e; }

  .caption-box {
    background: #0d1e30;
    border: 1px solid #2a4060;
    border-radius: 10px;
    padding: 14px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #b0c0d0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .hidden { display: none !important; }
  .results-section { display: none; }
  .results-section.visible { display: block; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #c8a84e; color: #0a1628;
    font-weight: 700; font-size: 0.85rem;
    padding: 10px 24px; border-radius: 100px;
    opacity: 0; transition: opacity 0.3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <h1>⚡ OSHINOBI GUT 24</h1>
  <p>Instagram 投稿画像ジェネレーター</p>
</header>

<div class="container">

  <!-- Photo -->
  <div class="card">
    <div class="card-title">📷 写真</div>
    <div class="photo-upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()">
      <div class="upload-hint" id="uploadHint">
        <span class="icon">📸</span>
        <span>タップして写真を選択<br>またはカメラで撮影</span>
      </div>
      <img id="previewImg" class="hidden" alt="preview">
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment">
  </div>

  <!-- Gut & Tension -->
  <div class="card">
    <div class="card-title">🎾 ガット・テンション</div>

    <label>ガット</label>
    <select id="gutSelect"></select>

    <div class="tension-row" style="margin-top:14px;">
      <div class="tension-group">
        <label>縦テンション</label>
        <div class="slider-wrap">
          <input type="range" id="tensionV" min="35" max="60" value="50" oninput="updateSlider(this,'tensionVVal')">
          <span class="slider-val" id="tensionVVal">50</span>
        </div>
      </div>
      <div class="tension-group">
        <label>横テンション</label>
        <div class="slider-wrap">
          <input type="range" id="tensionH" min="35" max="60" value="48" oninput="updateSlider(this,'tensionHVal')">
          <span class="slider-val" id="tensionHVal">48</span>
        </div>
      </div>
    </div>

    <label style="margin-top:14px;">ラケット</label>
    <select id="racketSelect" onchange="onRacketSelectChange()"></select>
    <input type="text" id="racketCustom" placeholder="ラケット名を入力" class="hidden" style="margin-top:8px;">

    <div class="compat-badge" id="compatBadge">
      <div class="compat-label">🔗 ガットとの相性</div>
      <div id="compatText"></div>
    </div>
  </div>

  <!-- Tip -->
  <div class="card">
    <div class="card-title">💡 ワンポイントネタ</div>
    <div class="tip-header">
      <span class="tip-label">自動生成（編集可能）</span>
      <button class="btn-regen" onclick="regenTip()">🎲 再生成</button>
    </div>
    <textarea id="tipText" rows="3"></textarea>
  </div>

  <!-- Generate -->
  <button class="btn-generate" onclick="generateImage()">✨ 画像を生成する</button>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="card">
      <div class="card-title">🖼 プレビュー</div>
      <canvas id="previewCanvas" width="1080" height="1080"></canvas>
    </div>

    <div class="action-row">
      <button class="btn-action" onclick="downloadImage()">⬇️ ダウンロード（PNG）</button>
      <button class="btn-action" onclick="copyCaption()">📋 キャプションをコピー</button>
    </div>

    <div class="card">
      <div class="card-title">📝 キャプション</div>
      <div class="caption-box" id="captionBox"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

function getCompatComment(racket, gut) {
  if (!racket) return null;
  // 同メーカー → 王道セッティング（最優先）
  if (racket.maker === gut.brand) {
    const sameMakerComments = [
      `${racket.maker}ラケット×${gut.name}はメーカー推奨の王道セッティング！相性は折り紙付きの鉄板コンビです🏆`,
      `${gut.brand}純正の組み合わせ。メーカーが自信を持って推奨する定番セッティングです👑`,
      `${racket.maker}ラケット×${gut.name}は定番中の定番。間違いのない王道セッティングです🔥`
    ];
    return sameMakerComments[Math.floor(Math.random() * sameMakerComments.length)];
  }
  for (const pattern of compatPatterns) {
    if (pattern.condition(racket, gut)) {
      const comments = pattern.comments;
      return comments[Math.floor(Math.random() * comments.length)];
    }
  }
  // Fallback
  const fallbacks = [
    `${racket.maker} ${racket.name}との組み合わせ。${gut.name}の特性をしっかり活かせるバランスのいいセッティングです🎾`,
    `ラケットとガットの特性が組み合わさったオリジナルセッティング。使い込むほど自分の武器になります💪`,
    `${racket.type}系ラケット×${gut.name}の組み合わせ。ラケットの特性をガットで上手く補完できています✅`
  ];
  return fallbacks[Math.floor(Math.random() * fallbacks.length)];
}

// ========== STATE ==========
let selectedGutIndex = 0;
let selectedRacket = null;
let uploadedImage = null;
let generatedImageURL = null;

// ========== INIT ==========
function init() {
  // Gut select
  const gutSel = document.getElementById('gutSelect');
  guts.forEach((g, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = `${g.name}（${g.brand}）— ¥${g.price.toLocaleString()}`;
    gutSel.appendChild(opt);
  });
  gutSel.addEventListener('change', () => {
    selectedGutIndex = parseInt(gutSel.value);
    regenTip();
    updateCompat();
  });

  // Racket select with optgroups
  const racketSel = document.getElementById('racketSelect');
  const noneOpt = document.createElement('option');
  noneOpt.value = '';
  noneOpt.textContent = '指定なし';
  racketSel.appendChild(noneOpt);

  const makers = [...new Set(rackets.map(r => r.maker))];
  makers.forEach(maker => {
    const group = document.createElement('optgroup');
    group.label = maker;
    rackets.filter(r => r.maker === maker).forEach((r, _) => {
      const idx = rackets.indexOf(r);
      const opt = document.createElement('option');
      opt.value = idx;
      opt.textContent = `${r.name}（${r.weight}g / ${r.headSize}sq.in.）`;
      group.appendChild(opt);
    });
    racketSel.appendChild(group);
  });

  const otherGroup = document.createElement('optgroup');
  otherGroup.label = 'その他';
  const otherOpt = document.createElement('option');
  otherOpt.value = 'custom';
  otherOpt.textContent = 'その他（手入力）';
  otherGroup.appendChild(otherOpt);
  racketSel.appendChild(otherGroup);

  regenTip();
  updateSlider(document.getElementById('tensionV'), 'tensionVVal');
  updateSlider(document.getElementById('tensionH'), 'tensionHVal');
}

// ========== RACKET SELECT ==========
function onRacketSelectChange() {
  const val = document.getElementById('racketSelect').value;
  const customInput = document.getElementById('racketCustom');
  if (val === 'custom') {
    customInput.classList.remove('hidden');
    selectedRacket = null;
  } else if (val === '') {
    customInput.classList.add('hidden');
    selectedRacket = null;
  } else {
    customInput.classList.add('hidden');
    selectedRacket = rackets[parseInt(val)];
  }
  updateCompat();
}

function updateCompat() {
  const badge = document.getElementById('compatBadge');
  const textEl = document.getElementById('compatText');
  if (!selectedRacket) {
    badge.classList.remove('visible');
    return;
  }
  const gut = guts[selectedGutIndex];
  const comment = getCompatComment(selectedRacket, gut);
  if (comment) {
    textEl.textContent = comment;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function getRacketDisplayName() {
  const val = document.getElementById('racketSelect').value;
  if (val === 'custom') {
    return document.getElementById('racketCustom').value.trim();
  }
  if (val === '' || val === null) return '';
  const r = rackets[parseInt(val)];
  return `${r.maker} ${r.name}`;
}

// ========== PHOTO ==========
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    uploadedImage = ev.target.result;
    const img = document.getElementById('previewImg');
    img.src = uploadedImage;
    img.classList.remove('hidden');
    document.getElementById('uploadHint').classList.add('hidden');
  };
  reader.readAsDataURL(file);
});

// ========== SLIDER ==========
function updateSlider(el, valId) {
  const min = parseInt(el.min), max = parseInt(el.max), val = parseInt(el.value);
  const pct = ((val - min) / (max - min) * 100).toFixed(1);
  el.style.setProperty('--pct', pct + '%');
  document.getElementById(valId).textContent = val;
}

// ========== TIP ==========
function regenTip() {
  const g = guts[selectedGutIndex];
  const tips = g.tips;
  const tip = tips[Math.floor(Math.random() * tips.length)];
  document.getElementById('tipText').value = tip;
}

// ========== GENERATE ==========
async function generateImage() {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1080, H = 1080;
  canvas.width = W; canvas.height = H;

  const gut = guts[selectedGutIndex];
  const tensionV = document.getElementById('tensionV').value;
  const tensionH = document.getElementById('tensionH').value;
  const racketDisplay = getRacketDisplayName();
  const tip = document.getElementById('tipText').value.trim();

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#1e3a5f');
  bg.addColorStop(1, '#0f2440');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Top bar gradient
  const topBar = ctx.createLinearGradient(0, 0, W, 0);
  topBar.addColorStop(0, '#c8a84e22');
  topBar.addColorStop(0.5, '#c8a84e44');
  topBar.addColorStop(1, '#c8a84e22');
  ctx.fillStyle = topBar;
  ctx.fillRect(0, 0, W, 110);

  // Gold accent line
  ctx.fillStyle = '#c8a84e';
  ctx.fillRect(0, 110, W, 3);

  // Title
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 42px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('OSHINOBI GUT 24', W / 2, 68);

  ctx.fillStyle = '#ffffff88';
  ctx.font = '22px "Helvetica Neue", Arial, sans-serif';
  ctx.fillText('ガット張替サービス', W / 2, 100);

  // Photo area
  const photoY = 125, photoH = 510;
  if (uploadedImage) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, photoY, W, photoH);
        ctx.clip();
        const scale = Math.max(W / img.width, photoH / img.height);
        const sw = img.width * scale, sh = img.height * scale;
        ctx.drawImage(img, (W - sw) / 2, photoY + (photoH - sh) / 2, sw, sh);
        ctx.restore();
        resolve();
      };
      img.src = uploadedImage;
    });
    const photoOverlay = ctx.createLinearGradient(0, photoY, 0, photoY + photoH);
    photoOverlay.addColorStop(0, 'rgba(15,36,64,0.1)');
    photoOverlay.addColorStop(0.7, 'rgba(15,36,64,0.2)');
    photoOverlay.addColorStop(1, 'rgba(15,36,64,0.85)');
    ctx.fillStyle = photoOverlay;
    ctx.fillRect(0, photoY, W, photoH);
  } else {
    ctx.fillStyle = '#0d1e30';
    ctx.fillRect(0, photoY, W, photoH);
    ctx.fillStyle = '#2a4060';
    ctx.font = '60px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('📷', W / 2, photoY + photoH / 2 + 20);
    ctx.fillStyle = '#3a5070';
    ctx.font = '28px Arial';
    ctx.fillText('写真をアップロードしてください', W / 2, photoY + photoH / 2 + 80);
  }

  // Bottom info panel
  const panelY = photoY + photoH;
  ctx.fillStyle = 'rgba(10,22,40,0.92)';
  ctx.fillRect(0, panelY, W, H - panelY);

  // Gut color accent bar
  ctx.fillStyle = gut.color;
  ctx.fillRect(0, panelY, W, 5);

  // Layout: left ~60% for text, right ~40% for radar chart
  const LEFT_MAX_X = 630;
  const RIGHT_START_X = 650;
  const chartCX = RIGHT_START_X + (W - RIGHT_START_X) / 2; // ~865
  const chartCY = panelY + (H - panelY - 30) / 2;
  const chartR = 150;

  // Gut name
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(gut.name, 50, panelY + 62);

  // Brand / type / gauge
  ctx.fillStyle = gut.color;
  ctx.font = 'bold 21px "Helvetica Neue", Arial, sans-serif';
  const brandText = `${gut.brand}  /${gut.type}  /${gut.gauge}`;
  ctx.fillText(brandText, 50, panelY + 93);

  // Tension display (left-aligned)
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 30px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText(`${tensionV} / ${tensionH} lbs`, 50, panelY + 130);
  ctx.fillStyle = '#8aa0bb';
  ctx.font = '17px "Helvetica Neue", Arial, sans-serif';
  ctx.fillText('縦 / 横テンション', 50, panelY + 153);

  // Racket (if set)
  let tipStartY = panelY + 178;
  if (racketDisplay) {
    ctx.fillStyle = '#8aa0bb';
    ctx.font = '20px "Helvetica Neue", Arial, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`🎾 ${racketDisplay}`, 50, tipStartY);
    tipStartY += 30;
  }

  // Divider (left panel only)
  ctx.strokeStyle = '#2a4060';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(50, tipStartY + 4);
  ctx.lineTo(LEFT_MAX_X, tipStartY + 4);
  ctx.stroke();
  tipStartY += 20;

  // Tip text (wrapped to left panel)
  ctx.fillStyle = '#d0dce8';
  ctx.font = '21px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'left';
  const tipLines = wrapText(ctx, tip, LEFT_MAX_X - 50, 21);
  tipLines.forEach((line, i) => {
    ctx.fillText(line, 50, tipStartY + i * 32);
  });

  // Vertical separator
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(RIGHT_START_X - 10, panelY + 15);
  ctx.lineTo(RIGHT_START_X - 10, H - 50);
  ctx.stroke();

  // Radar chart (right panel)
  if (gut.stats) {
    drawRadarChart(ctx, gut, chartCX, chartCY, chartR);
  }

  // Instagram handle
  ctx.fillStyle = '#c8a84e';
  ctx.font = 'bold 26px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('@oshinobi_gut_24', W / 2, H - 26);

  generatedImageURL = canvas.toDataURL('image/png');
  generateCaption(gut, tensionV, tensionH, racketDisplay, tip);

  document.getElementById('resultsSection').classList.add('visible');
  document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function wrapText(ctx, text, maxWidth, lineHeight) {
  const words = text.split('');
  const lines = [];
  let current = '';
  for (const ch of words) {
    const test = current + ch;
    if (ctx.measureText(test).width > maxWidth && current !== '') {
      lines.push(current);
      current = ch;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function hexToRgba(hex, alpha) {
  if (!hex || !hex.startsWith('#')) return `rgba(200,168,78,${alpha})`;
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function drawRadarChart(ctx, gut, cx, cy, r) {
  const labels = ['パワー', 'スピン', 'コントロール', '耐久性', '柔らかさ'];
  const keys = ['power', 'spin', 'control', 'durability', 'feel'];
  const stats = gut.stats;
  const n = 5;
  const startAngle = -Math.PI / 2;

  function getPoint(radius, index) {
    const angle = startAngle + index * (Math.PI * 2 / n);
    return { x: cx + radius * Math.cos(angle), y: cy + radius * Math.sin(angle) };
  }

  // 同心五角形ガイドライン（5段階）
  for (let level = 1; level <= 5; level++) {
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const pt = getPoint(r * level / 5, i);
      i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // 軸線
  for (let i = 0; i < n; i++) {
    const pt = getPoint(r, i);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(pt.x, pt.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // データ五角形（塗りつぶし）
  ctx.beginPath();
  for (let i = 0; i < n; i++) {
    const val = stats[keys[i]] || 0;
    const pt = getPoint(r * val / 5, i);
    i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
  }
  ctx.closePath();
  ctx.fillStyle = hexToRgba(gut.color, 0.3);
  ctx.fill();
  ctx.strokeStyle = hexToRgba(gut.color, 0.8);
  ctx.lineWidth = 2;
  ctx.stroke();

  // ラベル
  ctx.fillStyle = '#ffffff';
  ctx.font = '22px "Helvetica Neue", Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < n; i++) {
    const pt = getPoint(r + 30, i);
    ctx.fillText(labels[i], pt.x, pt.y);
  }
  ctx.textBaseline = 'alphabetic';
}

// ========== CAPTION ==========
const makerHashtags = {
  'YONEX': '#YONEX #ヨネックス',
  'Babolat': '#Babolat #バボラ',
  'Wilson': '#Wilson #ウィルソン',
  'HEAD': '#HEAD #ヘッド',
  'Dunlop': '#Dunlop #ダンロップ',
  'Prince': '#Prince #プリンス',
  'Tecnifibre': '#Tecnifibre #テクニファイバー',
};

function generateCaption(gut, tv, th, racketDisplay, tip) {
  const racketLine = racketDisplay ? `🎾 ラケット: ${racketDisplay}\n` : '';

  let compatLine = '';
  if (selectedRacket) {
    const comment = getCompatComment(selectedRacket, gut);
    if (comment) compatLine = `\n🔗 相性: ${comment}\n`;
  }

  let makerTag = '';
  if (selectedRacket && makerHashtags[selectedRacket.maker]) {
    makerTag = ' ' + makerHashtags[selectedRacket.maker];
  }

  const caption = `【GUT 24 張替完了🔥】

📌 ガット: ${gut.name}（${gut.brand}）
📐 テンション: 縦${tv}lbs / 横${th}lbs
${racketLine}${compatLine}
💡 ${tip}

━━━━━━━━━━━━━━
⚡ OSHINOBI GUT 24
全品工賃込み ¥${gut.price.toLocaleString()} 〜
当日〜翌日仕上げ対応！

📩 LINEでご注文・お問い合わせ
@oshinobi_gut_24 のプロフィールリンクから👆

#テニス #ガット張替 #OSHINOBIGU24 #${gut.name.replace(/[\s-]/g, '')} #${gut.brand} #札幌テニス #御忍庭球塾 #テニスガット${makerTag}`;
  document.getElementById('captionBox').textContent = caption;
}

// ========== ACTIONS ==========
function downloadImage() {
  if (!generatedImageURL) return showToast('先に画像を生成してください');
  const gut = guts[selectedGutIndex];
  const a = document.createElement('a');
  a.download = `gut24_${gut.name}_${Date.now()}.png`;
  a.href = generatedImageURL;
  a.click();
}

function copyCaption() {
  const text = document.getElementById('captionBox').textContent;
  navigator.clipboard.writeText(text).then(() => showToast('キャプションをコピーしました！'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ========== START ==========
init();
